<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#0B131D" />
      <stop offset="100%" stop-color="#05080C" />
    </linearGradient>
    <linearGradient id="neon1" x1="10" y1="90" x2="90" y2="10">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="50%" stop-color="#FF9933" />
      <stop offset="100%" stop-color="#FFD633" />
    </linearGradient>
    <linearGradient id="neon2" x1="10" y1="10" x2="90" y2="90">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#8A2BE2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#bg)" />
  <g filter="url(#glow)">
    <path d="M 25 75 Q 40 25, 75 25" fill="none" stroke="url(#neon1)" stroke-width="8" stroke-linecap="round" />
    <path d="M 25 25 Q 60 75, 75 75" fill="none" stroke="url(#neon2)" stroke-width="8" stroke-linecap="round" />
    <circle cx="25" cy="75" r="6" fill="#FF3366" />
    <circle cx="75" cy="25" r="6" fill="#FFD633" />
    <circle cx="25" cy="25" r="6" fill="#00F0FF" />
    <circle cx="75" cy="75" r="6" fill="#8A2BE2" />
    <circle cx="50" cy="50" r="4" fill="#FFFFFF" />
  </g>
</svg>
